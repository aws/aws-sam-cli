AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template for sam package with Fn::ForEach and dynamic CodeUri.
  This template generates multiple Lambda functions using Fn::ForEach
  with dynamic CodeUri (CodeUri: ${FunctionName}/), which should result
  in a generated Mappings section and Fn::FindInMap references.

Parameters:
  Runtime:
    Type: String
    Default: python3.13
    Description: Python runtime version for Lambda functions

Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    Runtime: !Ref Runtime

Resources:
  # Test Fn::ForEach generating multiple Lambda functions with dynamic CodeUri
  # This generates AlphaFunction and BetaFunction, each with their own CodeUri
  # AlphaFunction -> CodeUri: Alpha/
  # BetaFunction -> CodeUri: Beta/
  Fn::ForEach::Functions:
    - FunctionName
    - - Alpha
      - Beta
    - ${FunctionName}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: ${FunctionName}/
          Environment:
            Variables:
              FUNCTION_NAME: !Sub ${FunctionName}

Outputs:
  AlphaFunctionArn:
    Description: ARN of the Alpha function
    Value: !GetAtt AlphaFunction.Arn
  BetaFunctionArn:
    Description: ARN of the Beta function
    Value: !GetAtt BetaFunction.Arn
