openapi: "3.0.1"
info:
  title: "Orders API"
  description: "API for order management"
  version: "1.0.0"
paths:
  /orders:
    get:
      summary: "List all orders"
      operationId: "listOrders"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                    total:
                      type: number
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: "200"
    post:
      summary: "Create an order"
      operationId: "createOrder"
      responses:
        "201":
          description: "Order created"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 201}'
        responses:
          default:
            statusCode: "201"
