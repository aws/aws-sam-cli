AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template for sam package with Fn::ForEach, parameter-based collection,
  and dynamic CodeUri. This template uses !Ref ServiceNames as the collection
  with dynamic CodeUri (CodeUri: ${Name}/), which should emit a warning that
  collection values are fixed at package time.

Parameters:
  ServiceNames:
    Type: CommaDelimitedList
    Default: Users,Orders
    Description: List of service names to generate Lambda functions for
  Runtime:
    Type: String
    Default: python3.12
    Description: Python runtime version for Lambda functions

Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    Runtime: !Ref Runtime

Resources:
  # Test Fn::ForEach with parameter-based collection and dynamic CodeUri
  # This generates UsersService and OrdersService (based on default parameter value)
  # UsersService -> CodeUri: Users/
  # OrdersService -> CodeUri: Orders/
  # 
  # Since the collection is parameter-based (!Ref ServiceNames) and CodeUri is dynamic,
  # sam package should emit a warning that collection values are fixed at package time.
  Fn::ForEach::Services:
    - Name
    - !Ref ServiceNames
    - ${Name}Service:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: ${Name}/
          Environment:
            Variables:
              SERVICE_NAME: !Sub ${Name}

Outputs:
  UsersServiceArn:
    Description: ARN of the Users service function
    Value: !GetAtt UsersService.Arn
  OrdersServiceArn:
    Description: ARN of the Orders service function
    Value: !GetAtt OrdersService.Arn
