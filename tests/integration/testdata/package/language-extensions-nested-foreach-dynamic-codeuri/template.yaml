AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template for nested Fn::ForEach with dynamic CodeUri for package tests.

Resources:
  Fn::ForEach::Environments:
    - Env
    - - dev
      - prod
    - Fn::ForEach::Services:
        - Service
        - - Users
          - Orders
        - ${Env}${Service}Function:
            Type: AWS::Serverless::Function
            Properties:
              Handler: main.handler
              CodeUri: ./services/${Service}
              Runtime: python3.13
