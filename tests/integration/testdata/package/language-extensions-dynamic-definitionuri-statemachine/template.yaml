AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template for sam package with Fn::ForEach and dynamic DefinitionUri for State Machines.
  This template generates multiple Step Functions state machines using Fn::ForEach
  with dynamic DefinitionUri (DefinitionUri: ./statemachines/${WorkflowName}.asl.json), which should result
  in a generated Mappings section and Fn::FindInMap references.

Resources:
  # Test Fn::ForEach generating multiple state machines with dynamic DefinitionUri
  # This generates ProcessWorkflow and NotifyWorkflow, each with their own ASL definition
  # ProcessWorkflow -> DefinitionUri: ./statemachines/Process.asl.json
  # NotifyWorkflow -> DefinitionUri: ./statemachines/Notify.asl.json
  Fn::ForEach::Workflows:
    - WorkflowName
    - - Process
      - Notify
    - ${WorkflowName}Workflow:
        Type: AWS::Serverless::StateMachine
        Properties:
          Name: !Sub ${WorkflowName}Workflow
          DefinitionUri: ./statemachines/${WorkflowName}.asl.json
          Role: !GetAtt StateMachineRole.Arn

  # IAM role for state machines
  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StateMachinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

Outputs:
  ProcessWorkflowArn:
    Description: ARN of the Process workflow
    Value: !Ref ProcessWorkflow
  NotifyWorkflowArn:
    Description: ARN of the Notify workflow
    Value: !Ref NotifyWorkflow
