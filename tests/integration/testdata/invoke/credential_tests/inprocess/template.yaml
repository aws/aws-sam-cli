AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: STS Tests

Globals:
  Function:
    Timeout: 20


Resources:
  DotnetStsExample:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dotnet/STS
      Handler: STS::STS.Function::FunctionHandler
      Runtime: dotnet10
  GoStsExample:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: golang
      Handler: bootstrap
      Runtime: provided.al2023
    Metadata:
      BuildMethod: go1.x