AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-009: Invalid ForEach syntax test.
  Fn::ForEach has only 2 elements instead of the required 3. Should fail validation.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Resources:
  Fn::ForEach::Invalid:
    - LoopVar
    # Missing collection — only 2 elements instead of 3
    - ${LoopVar}Function:
        Type: AWS::Serverless::Function
        Properties:
          Runtime: !Ref Runtime
          Handler: main.handler
          InlineCode: "def handler(e, c): return {'statusCode': 200}"
