AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-010: Missing parameter reference test.
  ForEach references a parameter that does not exist.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Resources:
  Fn::ForEach::Functions:
    - Name
    - !Ref NonExistentParameter
    - ${Name}Function:
        Type: AWS::Serverless::Function
        Properties:
          Runtime: !Ref Runtime
          Handler: main.handler
          InlineCode: "def handler(e, c): return {'statusCode': 200}"
