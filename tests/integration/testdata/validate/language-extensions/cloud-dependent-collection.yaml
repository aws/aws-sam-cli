AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Invalid template with Fn::ForEach using cloud-dependent collection.
  Used for testing sam validate error handling with language extensions.
  This template should fail validation because Fn::GetAtt cannot be resolved locally.
  Validates: Requirements 5.1, 5.4, 5.5

Resources:
  # A DynamoDB table that provides the collection values
  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConfigTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Invalid Fn::ForEach - collection uses Fn::GetAtt which cannot be resolved locally
  # This should fail with a clear error message suggesting parameter workaround
  Fn::ForEach::Functions:
    - FunctionName
    - !GetAtt ConfigTable.StreamArn
    - ${FunctionName}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: ./src
          Runtime: python3.9
          Environment:
            Variables:
              FUNCTION_NAME: !Sub ${FunctionName}
