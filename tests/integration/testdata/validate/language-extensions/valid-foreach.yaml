AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Valid template with Fn::ForEach generating multiple Lambda functions.
  Used for testing sam validate with language extensions.
  Validates: Requirements 13.1, 13.6

Resources:
  # Fn::ForEach generating multiple Lambda functions (Requirement 13.1)
  # This generates AlphaFunction and BetaFunction
  Fn::ForEach::Functions:
    - FunctionName
    - - Alpha
      - Beta
    - ${FunctionName}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: ./src
          Runtime: python3.9
          FunctionName:
            Fn::Sub: ${FunctionName}-handler
          Environment:
            Variables:
              FUNCTION_NAME: !Sub ${FunctionName}

  # Additional resource to demonstrate combining multiple features (Requirement 13.6)
  SharedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub shared-bucket-${AWS::AccountId}
