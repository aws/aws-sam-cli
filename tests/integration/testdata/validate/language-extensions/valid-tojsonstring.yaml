AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Valid template demonstrating Fn::ToJsonString usage in function environment variables.
  Used for testing sam validate with language extensions.
  Validates: Requirements 13.2, 13.6

Resources:
  # Lambda function with Fn::ToJsonString in environment variables (Requirement 13.2)
  ConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      CodeUri: ./src
      Runtime: python3.9
      Environment:
        Variables:
          # Fn::ToJsonString converts an object to a JSON string
          CONFIG_JSON:
            Fn::ToJsonString:
              setting1: value1
              setting2: value2
              nested:
                key: value
          # Fn::ToJsonString with array
          ITEMS_JSON:
            Fn::ToJsonString:
              - Alpha
              - Beta
              - Gamma

  # Another function demonstrating Fn::ToJsonString with Fn::Length (Requirement 13.6)
  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: metrics.handler
      CodeUri: ./src
      Runtime: python3.9
      Environment:
        Variables:
          # Combining Fn::ToJsonString with other data
          METRICS_CONFIG:
            Fn::ToJsonString:
              enabled: true
              endpoints:
                - /health
                - /metrics
              retryCount: 3
          # Fn::Length for array operations
          ENDPOINT_COUNT:
            Fn::Length:
              - /health
              - /metrics
