AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-007: Empty collection edge case.
  Tests behavior when ForEach collection parameter is empty.

Parameters:
  FunctionNames:
    Type: CommaDelimitedList
    Default: ""
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Functions:
    - Name
    - !Ref FunctionNames
    - ${Name}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: src/
          Environment:
            Variables:
              FUNCTION_NAME: !Sub ${Name}
