AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-018: ForEach with S3 Buckets.
  Generates 3 S3 buckets and 3 Lambda functions triggered by S3 events.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Buckets:
    - BucketName
    - - uploads
      - thumbnails
      - exports
    - ${BucketName}Processor:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: processors/${BucketName}/
          Environment:
            Variables:
              BUCKET_NAME: !Sub ${BucketName}
          Events:
            S3Event:
              Type: S3
              Properties:
                Bucket: !Ref
                  Fn::Sub: "${BucketName}Bucket"
                Events: s3:ObjectCreated:*

      ${BucketName}Bucket:
        Type: AWS::S3::Bucket
        Properties:
          BucketName: !Sub "${AWS::StackName}-${BucketName}-${AWS::AccountId}"
