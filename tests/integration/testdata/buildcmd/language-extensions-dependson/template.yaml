AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-012: ForEach with DependsOn.
  Functions depend on a shared DynamoDB table.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  SharedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: shared-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  Fn::ForEach::Functions:
    - Name
    - [reader, writer]
    - ${Name}Function:
        Type: AWS::Serverless::Function
        DependsOn: SharedTable
        Properties:
          Handler: main.handler
          CodeUri: functions/${Name}/
          Environment:
            Variables:
              TABLE_NAME: !Ref SharedTable
              ROLE: !Sub ${Name}
