AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-017: ForEach with SNS Topics.
  Generates 3 SNS topics and 3 Lambda functions subscribed to those topics.

Parameters:
  Runtime:
    Type: String
    Default: python3.13
  NotificationEmail:
    Type: String
    Default: "test@example.com"

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Topics:
    - TopicName
    - - OrderEvents
      - PaymentEvents
      - ShippingEvents
    - ${TopicName}Topic:
        Type: AWS::SNS::Topic
        Properties:
          TopicName: !Sub "${AWS::StackName}-${TopicName}"

      ${TopicName}Handler:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: handlers/${TopicName}/
          Environment:
            Variables:
              TOPIC_NAME: !Sub ${TopicName}
          Events:
            SNSEvent:
              Type: SNS
              Properties:
                Topic: !Ref
                  Fn::Sub: "${TopicName}Topic"
