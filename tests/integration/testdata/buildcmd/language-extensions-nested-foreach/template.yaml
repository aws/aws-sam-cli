AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-003: Nested ForEach (2 levels).
  Outer loop over environments (dev, prod), inner loop over services (api, worker).
  Generates 4 functions total with dynamic CodeUri per env/service combination.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Environments:
    - Env
    - - dev
      - prod
    - Fn::ForEach::Services:
        - Service
        - - api
          - worker
        - ${Env}${Service}Function:
            Type: AWS::Serverless::Function
            Properties:
              Handler: main.handler
              CodeUri: services/${Env}/${Service}/
              Environment:
                Variables:
                  ENV: !Sub ${Env}
                  SERVICE: !Sub ${Service}
