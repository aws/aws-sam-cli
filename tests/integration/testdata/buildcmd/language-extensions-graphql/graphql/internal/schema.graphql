type Query {
  getUser(id: ID!): InternalUser
  listUsers: [InternalUser]
  getAuditLog(id: ID!): AuditLog
  listAuditLogs(limit: Int): [AuditLog]
}

type Mutation {
  updateUserRole(userId: ID!, role: String!): InternalUser
  deleteUser(id: ID!): Boolean
}

type InternalUser {
  id: ID!
  name: String!
  email: String
  role: String!
  createdAt: String!
  lastLogin: String
}

type AuditLog {
  id: ID!
  action: String!
  userId: ID!
  timestamp: String!
  details: String
}
