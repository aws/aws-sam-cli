AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-025: ForEach with dynamic GraphQL API SchemaUri.
  Generates 2 AppSync GraphQL APIs with separate schemas and resolver functions.
  Tests that SAMSchemaUriGraphQLAPIs and SAMCodeUriGraphQLAPIs Mappings are generated.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::GraphQLAPIs:
    - ApiName
    - - public
      - internal
    - ${ApiName}GraphQLApi:
        Type: AWS::Serverless::GraphQLApi
        Properties:
          SchemaUri: graphql/${ApiName}/schema.graphql
          Auth:
            Type: API_KEY
          ApiKeys:
            TestApiKey:
              Description: !Sub "API key for ${ApiName} API"

      ${ApiName}Resolver:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: graphql/${ApiName}/resolvers/
          Environment:
            Variables:
              API_NAME: !Sub ${ApiName}
