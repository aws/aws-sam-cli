AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::Serverless-2016-10-31

Description: >
  Parent template for nested stacks with language extensions test.
  This template references a child stack that uses AWS::LanguageExtensions.
  Validates Requirement 13.4: Test templates with nested stacks using language extensions.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  Runtime:
    Type: String
    Default: python3.13
    Description: Python runtime version for Lambda functions

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  # Parent-level Lambda function
  ParentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      CodeUri: src/
      FunctionName: parent-handler
      Environment:
        Variables:
          STACK_TYPE: parent
          ENVIRONMENT: !Ref Environment

  # Nested stack using AWS::Serverless::Application
  # The child template uses AWS::LanguageExtensions with Fn::ForEach
  ChildStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: child.yaml
      Parameters:
        Environment: !Ref Environment
        Runtime: !Ref Runtime

Outputs:
  ParentFunctionArn:
    Description: ARN of the parent Lambda function
    Value: !GetAtt ParentFunction.Arn
