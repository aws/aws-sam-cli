AWSTemplateFormatVersion : '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Runtime:
    Type: String
  DockerFile:
    Type: String
  Handler:
    Type: String
  Tag:
    Type: String
  Architectures:
    Type: String
    Default: x86_64

Resources:

  ImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - !Ref Handler
      Timeout: 600
      Architectures:
        - !Ref Architectures
    Metadata:
      DockerTag: !Ref Tag
      DockerContext: ./PythonImage
      Dockerfile: !Ref DockerFile
      DockerBuildArgs:
        BASE_RUNTIME: !Ref Runtime
