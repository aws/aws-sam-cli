openapi: "3.0.1"
info:
  title: "Inventory Service API"
  version: "1.0"
paths:
  /inventory:
    get:
      summary: "List inventory"
      responses:
        "200":
          description: "Success"
  /inventory/{sku}:
    get:
      summary: "Get inventory by SKU"
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Success"
