AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-021: ForEach with dynamic HttpApi DefinitionUri.
  Generates 3 HTTP APIs with separate OpenAPI definitions and 3 handler functions.
  Tests that SAMDefinitionUriHttpAPIs Mapping is generated.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::HttpAPIs:
    - ServiceName
    - - users
      - orders
      - inventory
    - ${ServiceName}HttpApi:
        Type: AWS::Serverless::HttpApi
        Properties:
          StageName: prod
          DefinitionUri: openapi/${ServiceName}/api.yaml

      ${ServiceName}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: services/${ServiceName}/
          Environment:
            Variables:
              SERVICE_NAME: !Sub ${ServiceName}
