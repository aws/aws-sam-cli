AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template for sam build with Fn::ForEach and dynamic ImageUri.
  This template generates multiple container image Lambda functions using Fn::ForEach
  with dynamic ImageUri (ImageUri: emulation-python3.9-${FunctionName}:latest), which should result
  in a generated Mappings section and Fn::FindInMap references in the build output.

Resources:
  # Test Fn::ForEach generating multiple container image functions with dynamic ImageUri
  # This generates alphaFunction and betaFunction, each with their own image
  # alphaFunction -> ImageUri: emulation-python3.9-alpha:latest
  # betaFunction -> ImageUri: emulation-python3.9-beta:latest
  # NOTE: Collection values must be lowercase because Docker repository names are case-sensitive
  # and must be lowercase.
  Fn::ForEach::Functions:
    - FunctionName
    - - alpha
      - beta
    - ${FunctionName}Function:
        Type: AWS::Serverless::Function
        Properties:
          FunctionName: !Sub ${FunctionName}Function
          PackageType: Image
          ImageUri: emulation-python3.9-${FunctionName}:latest
          Timeout: 30
          MemorySize: 512

Outputs:
  alphaFunctionArn:
    Description: ARN of the alpha function
    Value: !GetAtt alphaFunction.Arn
  betaFunctionArn:
    Description: ARN of the beta function
    Value: !GetAtt betaFunction.Arn
