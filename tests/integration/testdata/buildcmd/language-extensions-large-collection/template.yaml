AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-014: Large ForEach collection (50 items).
  Performance test for large-scale ForEach expansion.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Functions:
    - FunctionName
    - - func001
      - func002
      - func003
      - func004
      - func005
      - func006
      - func007
      - func008
      - func009
      - func010
      - func011
      - func012
      - func013
      - func014
      - func015
      - func016
      - func017
      - func018
      - func019
      - func020
      - func021
      - func022
      - func023
      - func024
      - func025
      - func026
      - func027
      - func028
      - func029
      - func030
      - func031
      - func032
      - func033
      - func034
      - func035
      - func036
      - func037
      - func038
      - func039
      - func040
      - func041
      - func042
      - func043
      - func044
      - func045
      - func046
      - func047
      - func048
      - func049
      - func050
    - ${FunctionName}Function:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: src/
          Environment:
            Variables:
              FUNCTION_NAME: !Sub ${FunctionName}
