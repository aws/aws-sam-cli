AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  TC-016: Standard SAM template without language extensions.
  Backward compatibility test — no Fn::ForEach, no AWS::LanguageExtensions.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      CodeUri: src/
      Environment:
        Variables:
          FUNCTION_NAME: Hello
