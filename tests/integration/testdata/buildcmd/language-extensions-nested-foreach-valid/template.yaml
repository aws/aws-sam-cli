AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  Test template with 5 levels of nested Fn::ForEach (at the maximum allowed limit).
  This template should be valid and process successfully.

Resources:
  # 5 levels of nested Fn::ForEach - at the maximum allowed limit
  Fn::ForEach::Level1:
    - L1
    - [A]
    - Fn::ForEach::Level2:
        - L2
        - [B]
        - Fn::ForEach::Level3:
            - L3
            - [C]
            - Fn::ForEach::Level4:
                - L4
                - [D]
                - Fn::ForEach::Level5:
                    - L5
                    - [E]
                    - ${L1}${L2}${L3}${L4}${L5}Resource:
                        Type: AWS::CloudFormation::WaitConditionHandle
                        # Using WaitConditionHandle as it requires no properties
                        # and is the simplest resource type for testing nesting
