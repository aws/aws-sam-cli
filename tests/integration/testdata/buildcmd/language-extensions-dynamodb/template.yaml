AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-019: ForEach with DynamoDB Tables.
  Generates 3 DynamoDB tables with streams and 3 Lambda stream processors.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  Fn::ForEach::Tables:
    - TableName
    - - Users
      - Orders
      - Products
    - ${TableName}Table:
        Type: AWS::DynamoDB::Table
        Properties:
          TableName: !Sub "${AWS::StackName}-${TableName}"
          BillingMode: PAY_PER_REQUEST
          AttributeDefinitions:
            - AttributeName: id
              AttributeType: S
          KeySchema:
            - AttributeName: id
              KeyType: HASH
          StreamSpecification:
            StreamViewType: NEW_AND_OLD_IMAGES

      ${TableName}StreamProcessor:
        Type: AWS::Serverless::Function
        Properties:
          Handler: main.handler
          CodeUri: stream-processors/${TableName}/
          Environment:
            Variables:
              TABLE_NAME: !Sub ${TableName}
          Events:
            DDBStream:
              Type: DynamoDB
              Properties:
                Stream: !GetAtt
                  - !Sub "${TableName}Table"
                  - StreamArn
                StartingPosition: TRIM_HORIZON
                BatchSize: 10
