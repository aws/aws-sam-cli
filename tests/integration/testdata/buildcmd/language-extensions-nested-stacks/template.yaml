AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: >
  TC-015: ForEach with nested stacks.
  Parent stack generates 3 nested child stacks plus a parent function.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: !Ref Runtime

Resources:
  ParentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      CodeUri: src/
      Environment:
        Variables:
          STACK_TYPE: parent

  Fn::ForEach::Stacks:
    - StackName
    - [compute, network, storage]
    - ${StackName}Stack:
        Type: AWS::CloudFormation::Stack
        Properties:
          TemplateURL: ./${StackName}/template.yaml
