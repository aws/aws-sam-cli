AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Description: Compute nested stack with ForEach-generated functions.

Parameters:
  Runtime:
    Type: String
    Default: python3.13

Resources:
  Fn::ForEach::Functions:
    - Name
    - [processor, scheduler]
    - ${Name}Function:
        Type: AWS::Serverless::Function
        Properties:
          Runtime: !Ref Runtime
          Handler: main.handler
          CodeUri: src/
          Environment:
            Variables:
              STACK_TYPE: compute
              FUNCTION_NAME: !Sub ${Name}
