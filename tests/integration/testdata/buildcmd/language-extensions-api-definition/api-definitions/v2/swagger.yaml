swagger: "2.0"
info:
  title: "v2 API"
  version: "2.0"
basePath: "/v2"
schemes:
  - "https"
paths:
  /health:
    get:
      produces:
        - "application/json"
      responses:
        "200":
          description: "Success"
      x-amazon-apigateway-integration:
        type: mock
        passthroughBehavior: when_no_match
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: "200"
            responseTemplates:
              application/json: '{"version": "v2", "status": "healthy"}'
  /v2/resource:
    get:
      produces:
        - "application/json"
      responses:
        "200":
          description: "Success"
      x-amazon-apigateway-integration:
        type: mock
        passthroughBehavior: when_no_match
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: "200"
            responseTemplates:
              application/json: '{"version": "v2", "data": "resource"}'
