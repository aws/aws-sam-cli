swagger: "2.0"
info:
  title: "Orders Service API"
  version: "1.0"
basePath: "/prod"
schemes:
  - "https"
paths:
  /orders:
    get:
      produces:
        - "application/json"
      responses:
        "200":
          description: "Success"
      x-amazon-apigateway-integration:
        type: mock
        passthroughBehavior: when_no_match
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: "200"
            responseTemplates:
              application/json: '{"service": "orders", "data": []}'
